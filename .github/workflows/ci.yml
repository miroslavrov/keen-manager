name: CI

# Build, vet, test and cross-compile on every push / PR to main so a broken
# commit is caught before it is tagged for release.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # Pinned to the toolchain the committed bundle is built with so the
          # "bundle up-to-date" guard below is byte-deterministic (bundling is
          # done by lockfile-pinned vite/rollup/esbuild, but we pin Node too to
          # remove the last variable).
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      # Build the front-end into internal/webui/dist so the go:embed matches the
      # current sources (not just the committed bundle).
      - name: Build front-end
        run: make web

      # Guard against the stale-embedded-bundle bug: if the freshly built bundle
      # differs from what's committed, someone changed web/src without running
      # `make web`. Fail loudly with instructions rather than shipping blank tabs.
      - name: Verify committed bundle is up to date
        run: |
          if ! git diff --exit-code -- internal/webui/dist; then
            echo "::error::internal/webui/dist is stale. Run 'make web' and commit the rebuilt bundle."
            exit 1
          fi

      - name: Vet
        run: make vet

      - name: Test
        run: make test

      # Headless smoke test: render every tab and assert none trips an error
      # boundary (the regression guard for the blank-tabs bug).
      - name: Web smoke tests
        run: cd web && npm test

      # Sanity check that every router target still cross-compiles.
      - name: Cross-compile all targets
        run: make build-all
