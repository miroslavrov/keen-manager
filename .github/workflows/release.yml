name: Release

# On a version tag (v*), build the front-end, cross-compile every router target,
# gzip them into the exact asset names install.sh downloads
# (keen-manager-<arch>.gz), and publish a GitHub Release with checksums.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so `git describe --tags` injects the real version.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      # web + build-all + gzip -> build/keen-manager-{mipsle,mips,arm64,arm}.gz
      - name: Build release artifacts
        run: make dist

      - name: Generate checksums
        run: |
          cd build
          sha256sum keen-manager-*.gz > sha256sums.txt
          cat sha256sums.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/keen-manager-*.gz
            build/sha256sums.txt
          generate_release_notes: true
          fail_on_unmatched_files: true
