name: Release

# On a version tag (v*), build the front-end, cross-compile every router target,
# gzip them into the exact asset names install.sh downloads
# (keen-manager-<arch>.gz), and publish a GitHub Release with checksums.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so `git describe --tags` injects the real version.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      # web + build-all + gzip -> build/keen-manager-{mipsle,mips,arm64,arm}.gz
      - name: Build release artifacts
        run: make dist

      - name: Generate checksums
        run: |
          cd build
          sha256sum keen-manager-*.gz > sha256sums.txt
          cat sha256sums.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/keen-manager-*.gz
            build/sha256sums.txt
          generate_release_notes: true
          fail_on_unmatched_files: true
          # Any tag with a hyphen (v0.1.0-beta.1) is a pre-release.
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            ## keen-manager ${{ github.ref_name }}

            Unified VPN (Xray / AmneziaWG) + DPI-bypass (nfqws2) manager for Keenetic
            routers running Entware. Single static binary with an embedded web UI and CLI.

            ---

            ### Установка / Install (Entware, one-liner)

            ```sh
            opkg update && opkg install curl
            curl -fsSL https://raw.githubusercontent.com/miroslavrov/keen-manager/main/scripts/install.sh | sh
            ```

            The installer auto-detects your router architecture (mipsle / mips / arm64 / arm),
            downloads the matching binary below, installs the init script, and starts the
            daemon. Then open the web UI at **http://ROUTER_IP:8088**.

            Установщик сам определит архитектуру роутера, скачает нужный бинарь,
            поставит init-скрипт и запустит демон. Веб-интерфейс — **http://IP_РОУТЕРА:8088**.

            ### Обновление / Upgrade

            Re-run the install command above — it replaces the binary atomically and restarts.
            Повторно запусти команду установки — бинарь заменится атомарно, демон перезапустится.

            ### Удаление / Uninstall

            ```sh
            curl -fsSL https://raw.githubusercontent.com/miroslavrov/keen-manager/main/scripts/uninstall.sh | sh
            ```

            ### Проверка целостности / Verify

            ```sh
            sha256sum -c sha256sums.txt
            ```

            > ⚠️ **Beta.** Transparent-proxy (TPROXY) and kill-switch are **opt-in** and
            > **off by default** — installing does not touch your router's firewall until you
            > enable them. Bypassed ranges keep the LAN and router reachable even if a tunnel
            > breaks. Report issues on the repo.
